<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Task manager - Manage your tasks efficiently with stats and fiters.">
    <meta name="keywords" content="task manager, productivity, task tracking">
    <title>Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<!-- Main Text -->

<body>
    <div class="container">
        <h1>Task Manager</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>
        <!-- Input Section -->
        <div class="input-section">
            <div class="form-group">
                <label for="taskTitle">Task Title</label>
                <input type="text" id="taskTitle" placeholder="Enter task title..." autocomplete="off">
            </div>
            <div class="form-group">
                <label for="taskDescription">Description</label>
                <textarea id="taskDescription" placeholder="Enter task description..."></textarea>
            </div>
            <button class="btn-primary" onclick="addTask()">Add Task</button>
        </div>
        <!-- Button Section -->
        <div class="filter-section">
            <button class="filter-btn active" onclick="setFilter('all')">All</button>
            <button class="filter-btn" onclick="setFilter('pending')">Pending</button>
            <button class="filter-btn" onclick="setFilter('completed')">Completed</button>
        </div>

        <div id="tasksContainer" class="tasks-container">
            <!-- Tasks will be rendered here -->
        </div>
    </div>
    <script src="script.js" defer></script>
</body>

</html>
